name: Run main.py (manual)

# 트리거: 오직 수동 — GitHub 웹/모바일에서 'Run workflow' 버튼 클릭
# 용도: 모바일에서도 거래내역 처리 + 포트폴리오 갱신 + 성과 분석 수행
on:
  workflow_dispatch:

jobs:
  run-main:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Node.js 20 deprecation 회피 — actions 가 Node 24 에서 돌도록 강제
    # (2026-06-02 부터 기본값이 Node 24, 2026-09-16 에 Node 20 제거 예정)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup service_account.json
        run: echo "$GCP_SA_JSON" > service_account.json
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}

      - name: Run main.py
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python main.py
